<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Solver Pro - Tactical Hide</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0b0b; color: #ffffff; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: transform 0.2s ease; transform-origin: top center; }
        .container { width: 100%; max-width: 500px; background: #1a1a1a; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        h2 { text-align: center; color: #ffeb3b; margin: 0 0 10px 0; }
        #status { font-size: 10px; text-align: center; color: #666; margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #333; border-radius: 8px; background: #252525; color: #00ff96; font-size: 20px; font-weight: bold; box-sizing: border-box; outline: none; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
        input[type="text"]:focus { border-color: #00ff96; }
        .settings-panel { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ffeb3b; }
        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; font-size: 12px; color: #ffeb3b; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .setting-item input[type="range"] { width: 100%; cursor: pointer; }
        .toggle-container { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .toggle-main-btn { flex: 1; padding: 10px; background: #333; color: #ffeb3b; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .toggle-main-btn:hover { background: #444; }
        .btn-settings { background: #444; color: #fff; }
        .btn-group { background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #222; }
        .btn-label { font-size: 10px; color: #aaa; margin-bottom: 8px; display: block; text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        .counter-section { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .counter-btn { padding: 6px 8px; font-size: 10px; font-weight: bold; cursor: pointer; background: #2a2a2a; color: #ccc; border: 1px solid #444; border-radius: 4px; min-width: 50px; }
        .counter-btn.active { background: #ffeb3b !important; color: #000 !important; border-color: #ffeb3b; }
        .alphabet-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .alphabet-btn { padding: 8px 0; background: #1a1a1a; color: #00ff96; border: 1px solid #333; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        #resultList { margin-top: 10px; max-height: 400px; overflow-y: auto; border-top: 1px solid #333; }
        .word-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; }
        .trap-eh { color: #ff00ff; font-weight: bold; border-left-color: #ff00ff; padding-left: 10px; }
        .trap-xy { color: #ffff00; font-weight: bold; border-left-color: #ffff00; padding-left: 10px; }
        .trap-others { color: #ff5252; font-weight: bold; border-left-color: #ff5252; padding-left: 10px; }
        .word-item.normal { color: #00ff96; border-left-color: #00ff96; padding-left: 10px; }
        .char-count { font-size: 10px; color: #555; background: #000; padding: 2px 5px; border-radius: 4px; }
        .mode-indicator { font-size: 11px; color: #ffeb3b; padding: 10px; display: block; text-align: center; background: #151515; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Word Solver Pro</h2>
    <div id="status">Syncing...</div>
    
    <input type="text" id="searchInput" placeholder="CARI KATA..." autocomplete="off">

    <div class="toggle-container" id="mainToggleArea">
        <button class="toggle-main-btn btn-settings" onclick="toggleElement('settingsPanel')">⚙️ PENGATURAN</button>
        <button class="toggle-main-btn" onclick="toggleElement('trapPanel')">🛡️ PANEL JEBAKAN</button>
        <button class="toggle-main-btn" onclick="toggleElement('alphaPanel')">⌨️ A-Z</button>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
        <div class="setting-item">
            <label>Max List: <span id="maxWordsVal">1000</span> kata</label>
            <input type="range" id="maxWordsSlider" min="50" max="1000" step="50" value="1000">
        </div>
        <div class="setting-item">
            <label>Zoom Tampilan: <span id="zoomVal">100</span>%</label>
            <input type="range" id="zoomSlider" min="70" max="130" step="5" value="100">
        </div>
    </div>

    <div id="expandablePanels">
        <div id="trapPanel" class="btn-group hidden">
            <span class="btn-label">Jawab Lawan (Awalan)</span>
            <div class="counter-section" id="startTrapArea"></div>
            <div style="margin-top: 10px;"></div>
            <span class="btn-label">Strategi (Akhiran)</span>
            <div class="counter-section" id="endTrapArea"></div>
        </div>

        <div id="alphaPanel" class="btn-group hidden">
            <span class="btn-label">Pilih Awalan (A-Z)</span>
            <div class="alphabet-grid" id="alphabetArea"></div>
        </div>
    </div>
    
    <div id="resultList"></div>
</div>

<script src="script.js"></script>

</body>
</html>
